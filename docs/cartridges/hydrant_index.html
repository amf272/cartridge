<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hydrant Index: Jackpot</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
      background: #17211d;
      color: #172033;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(440px, 100%);
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #f8fafc;
      box-shadow: 0 18px 42px #0008;
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    h1 {
      margin: 0;
      color: #0f172a;
      font-size: 31px;
      line-height: 1;
    }
    .sub {
      margin: 6px 0 0;
      color: #475569;
      font-size: 13px;
      font-weight: 750;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(72px, 1fr));
      gap: 8px;
      min-width: 152px;
    }
    .stat {
      border-radius: 8px;
      padding: 8px 10px;
      background: #0f172a;
      color: #f8fafc;
      text-align: center;
    }
    .label {
      display: block;
      color: #cbd5e1;
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .value {
      display: block;
      margin-top: 2px;
      font-size: 18px;
      font-weight: 950;
    }
    .card {
      margin: 16px 0 12px;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 14px;
      background: #f0fdf4;
    }
    .kicker {
      margin: 0 0 5px;
      color: #15803d;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .corner {
      margin: 0 0 10px;
      color: #111827;
      font-size: 22px;
      font-weight: 950;
      line-height: 1.1;
    }
    .clue {
      margin: 0;
      color: #334155;
      font-size: 15px;
      font-weight: 750;
      line-height: 1.35;
    }
    .guess-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid #94a3b8;
      border-radius: 8px;
      padding: 8px 10px;
      color: #0f172a;
      font: inherit;
      font-weight: 850;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #22c55e;
      color: #052e16;
      font: inherit;
      font-weight: 950;
      min-height: 42px;
      padding: 9px 12px;
    }
    button.secondary {
      margin-top: 8px;
      width: 100%;
      background: #e2e8f0;
      color: #0f172a;
    }
    .status {
      min-height: 42px;
      margin: 10px 0 0;
      color: #334155;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.35;
    }
    .result {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #020617b8;
    }
    .result[hidden] { display: none; }
    .result-card {
      width: min(340px, 100%);
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 16px;
      background: #f8fafc;
      color: #0f172a;
      box-shadow: 0 16px 38px #0008;
    }
    .result-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .result-card p {
      margin: 0 0 12px;
      color: #334155;
      font-weight: 850;
      line-height: 1.35;
    }
    textarea {
      width: 100%;
      height: 74px;
      margin-top: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      font: inherit;
      resize: none;
    }
    @media (max-width: 390px) {
      main { padding: 10px; }
      .top { display: grid; }
      .stats { width: 100%; }
      h1 { font-size: 28px; }
      .guess-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1>Hydrant Index: Jackpot</h1>
        <p class="sub">Guess the annual ticket haul around the corner.</p>
      </div>
      <div class="stats" aria-live="polite">
        <div class="stat">
          <span class="label">Score</span>
          <span class="value" id="scoreValue">0</span>
        </div>
        <div class="stat">
          <span class="label">Round</span>
          <span class="value" id="roundValue">1/5</span>
        </div>
      </div>
    </div>

    <section class="card" aria-live="polite">
      <p class="kicker" id="neighborhoodLine"></p>
      <p class="corner" id="cornerLine"></p>
      <p class="clue" id="clueLine"></p>
    </section>

    <div class="guess-row">
      <input id="guessInput" type="number" min="0" inputmode="numeric" placeholder="Annual ticket guess">
      <button id="guessButton" type="button">Guess</button>
    </div>
    <button id="nextButton" class="secondary" type="button">Reveal / next</button>
    <p class="status" id="statusLine"></p>
  </main>

  <div class="result" id="result" hidden>
    <div class="result-card">
      <h2 id="resultTitle">Final score</h2>
      <p id="resultText"></p>
      <textarea id="copyFallback" readonly></textarea>
    </div>
  </div>

  <script>
    (() => {
      const seedDeck = [
        {
          corner: "W 14th St & 8th Ave",
          neighborhood: "Chelsea",
          clue: "Nightlife block, narrow curb, heavy rideshare turnover.",
          tickets: 412,
        },
        {
          corner: "N 7th St & Bedford Ave",
          neighborhood: "Williamsburg",
          clue: "Weekend retail strip near the subway entrance.",
          tickets: 536,
        },
        {
          corner: "Court St & Atlantic Ave",
          neighborhood: "Boerum Hill",
          clue: "School-day loading pressure beside a bus lane.",
          tickets: 287,
        },
        {
          corner: "Broadway & W 96th St",
          neighborhood: "Upper West Side",
          clue: "Express stop, delivery churn, and a short legal curb.",
          tickets: 624,
        },
        {
          corner: "37th Ave & 74th St",
          neighborhood: "Jackson Heights",
          clue: "Dense market block with double-parking spillover.",
          tickets: 458,
        },
      ];

      const state = {
        deck: seedDeck,
        round: 0,
        history: [],
        score: 0,
        revealed: false,
        lastResult: null,
        ended: false,
      };

      const els = {
        score: document.getElementById("scoreValue"),
        round: document.getElementById("roundValue"),
        neighborhood: document.getElementById("neighborhoodLine"),
        corner: document.getElementById("cornerLine"),
        clue: document.getElementById("clueLine"),
        guess: document.getElementById("guessInput"),
        status: document.getElementById("statusLine"),
        result: document.getElementById("result"),
        resultTitle: document.getElementById("resultTitle"),
        resultText: document.getElementById("resultText"),
        copyFallback: document.getElementById("copyFallback"),
      };

      function currentCard() {
        return state.deck[Math.min(state.round, state.deck.length - 1)];
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function normalizeGuess(value) {
        const guess = Number(value);
        if (!Number.isFinite(guess) || guess < 0) {
          throw new Error("Guess must be a non-negative number");
        }
        return Math.round(guess);
      }

      function scoreGuess(value) {
        const card = currentCard();
        const guess = normalizeGuess(value);
        const answer = Number(card.tickets);
        const missPct = answer > 0
          ? Math.round(Math.abs(guess - answer) / answer * 100)
          : 0;
        const points = Math.max(0, 100 - missPct);
        const direction = guess === answer ? "exact" : guess > answer ? "high" : "low";

        return { answer, direction, guess, missPct, points };
      }

      function submitGuess(value) {
        if (state.ended) return state.lastResult;
        const result = scoreGuess(value);
        if (state.revealed && state.lastResult) {
          state.score -= state.lastResult.points;
          state.history.pop();
        }
        state.lastResult = result;
        state.revealed = true;
        state.score += result.points;
        state.history.push(result);
        render();
        return clone(result);
      }

      function revealAnswer() {
        if (state.ended) return getState();
        if (!state.revealed) {
          const card = currentCard();
          state.lastResult = {
            answer: Number(card.tickets),
            direction: "revealed",
            guess: null,
            missPct: 100,
            points: 0,
          };
          state.history.push(state.lastResult);
          state.revealed = true;
          render();
          return getState();
        }
        if (state.round >= state.deck.length - 1) {
          finishGame();
          return getState();
        }
        state.round += 1;
        state.revealed = false;
        state.lastResult = null;
        els.guess.value = "";
        render();
        return getState();
      }

      function averageMiss() {
        if (!state.history.length) return 0;
        const total = state.history.reduce((sum, item) => sum + Number(item.missPct || 0), 0);
        return Math.round(total / state.history.length);
      }

      function shareText() {
        return "Hydrant Index score " + Math.round(state.score) +
          " | avg miss " + averageMiss() + "% | rounds " + state.history.length;
      }

      function finishGame(title) {
        state.ended = true;
        const text = shareText();
        els.resultTitle.textContent = title || "Hydrant haul complete";
        els.resultText.textContent = text;
        els.copyFallback.value = text;
        els.result.hidden = false;
        window.parent.postMessage({ type: "cartridge-result", text }, "*");
        render();
        return text;
      }

      function setState(nextState) {
        Object.assign(state, clone(nextState));
        state.deck = state.deck && state.deck.length ? state.deck : seedDeck;
        state.history = state.history || [];
        state.score = Number(state.score || 0);
        state.round = Number(state.round || 0);
        state.revealed = Boolean(state.revealed);
        state.lastResult = state.lastResult || null;
        state.ended = Boolean(state.ended);
        render();
      }

      function getState() {
        return clone(state);
      }

      function render() {
        const card = currentCard();
        els.score.textContent = String(Math.round(state.score));
        els.round.textContent = (Math.min(state.round + 1, state.deck.length)) + "/" + state.deck.length;
        els.neighborhood.textContent = card.neighborhood;
        els.corner.textContent = card.corner;
        els.clue.textContent = card.clue;

        if (state.revealed && state.lastResult) {
          const result = state.lastResult;
          const guessText = result.guess === null ? "No guess" : result.guess.toLocaleString() + " tickets";
          const direction = result.direction === "exact" ? "exact" : result.direction;
          els.status.textContent = "Answer " + result.answer.toLocaleString() +
            " tickets. " + guessText + " was " + direction +
            " by " + result.missPct + "% for " + result.points + " points.";
        } else {
          els.status.textContent = "Round " + (state.round + 1) + ": estimate the annual hydrant-ticket haul.";
        }
      }

      document.getElementById("guessButton").addEventListener("click", () => {
        try {
          submitGuess(els.guess.value);
        } catch (error) {
          els.status.textContent = error.message;
        }
      });
      document.getElementById("nextButton").addEventListener("click", revealAnswer);
      els.guess.addEventListener("keydown", (event) => {
        if (event.key === "Enter") document.getElementById("guessButton").click();
      });

      window.__cartridgeHydrantIndex = {
        setState,
        getState,
        submitGuess,
        revealAnswer,
        finishGame,
      };

      render();
    })();
  </script>
</body>
</html>
