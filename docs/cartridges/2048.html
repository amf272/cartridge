<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2048</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
      background: #111827;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(430px, 100%);
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #f8fafc;
      box-shadow: 0 18px 40px #0008;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }
    h1 {
      margin: 0;
      color: #0f172a;
      font-size: 42px;
      line-height: 1;
    }
    .sub {
      margin: 6px 0 0;
      color: #475569;
      font-size: 14px;
      font-weight: 750;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(72px, 1fr));
      gap: 8px;
      min-width: 154px;
    }
    .stat {
      border-radius: 8px;
      padding: 8px 10px;
      background: #0f172a;
      color: #f8fafc;
      text-align: center;
    }
    .label {
      display: block;
      color: #94a3b8;
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .value {
      display: block;
      margin-top: 2px;
      font-size: 18px;
      font-weight: 950;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      aspect-ratio: 1;
      margin: 16px 0 12px;
      padding: 8px;
      border-radius: 8px;
      background: #1f2937;
      touch-action: none;
      user-select: none;
    }
    .cell {
      display: grid;
      place-items: center;
      min-width: 0;
      border-radius: 6px;
      background: #334155;
      color: #f8fafc;
      font-size: 28px;
      font-weight: 950;
      line-height: 1;
    }
    .cell.empty { color: transparent; background: #263244; }
    .cell.wide { font-size: 22px; }
    .cell.v2 { background: #e0f2fe; color: #0f172a; }
    .cell.v4 { background: #bae6fd; color: #0f172a; }
    .cell.v8 { background: #fbbf24; color: #111827; }
    .cell.v16 { background: #fb7185; color: #fff1f2; }
    .cell.v32 { background: #38bdf8; color: #082f49; }
    .cell.v64 { background: #14b8a6; color: #ecfeff; }
    .cell.v128 { background: #a3e635; color: #1a2e05; }
    .cell.v256 { background: #f97316; color: #fff7ed; }
    .cell.v512 { background: #8b5cf6; color: #f5f3ff; }
    .cell.v1024 { background: #ef4444; color: #fef2f2; }
    .cell.v2048,
    .cell.super { background: #fde047; color: #111827; }
    .status {
      min-height: 22px;
      margin: 0 0 10px;
      color: #334155;
      font-size: 14px;
      font-weight: 800;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 42px);
      gap: 5px;
      justify-content: center;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #14b8a6;
      color: #042f2e;
      font: inherit;
      font-weight: 900;
      min-height: 40px;
      padding: 9px 12px;
    }
    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    button.arrow {
      width: 42px;
      height: 38px;
      min-height: 38px;
      padding: 0;
      background: #0f172a;
      color: #f8fafc;
      font-size: 20px;
    }
    .spacer { visibility: hidden; }
    .result {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #020617b8;
    }
    .result[hidden] { display: none; }
    .result-card {
      width: min(340px, 100%);
      border: 1px solid #7dd3fc;
      border-radius: 8px;
      padding: 16px;
      background: #f8fafc;
      color: #0f172a;
      box-shadow: 0 16px 38px #0008;
    }
    .result-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .result-card p {
      margin: 0 0 12px;
      color: #334155;
      font-weight: 800;
      line-height: 1.35;
    }
    .result-card .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    textarea {
      width: 100%;
      height: 74px;
      margin-top: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      font: inherit;
      resize: none;
    }
    @media (max-width: 360px) {
      main { padding: 10px; }
      h1 { font-size: 34px; }
      .top { display: grid; }
      .stats { width: 100%; }
      .cell { font-size: 24px; }
      .cell.wide { font-size: 19px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1>2048</h1>
        <p class="sub">Join matching tiles to reach 2048.</p>
      </div>
      <div class="stats" aria-live="polite">
        <div class="stat">
          <span class="label">Score</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="label">Best Tile</span>
          <span class="value" id="bestTile">2</span>
        </div>
      </div>
    </div>

    <section class="board" id="board" aria-label="2048 board"></section>
    <p class="status" id="status">Ready.</p>

    <div class="actions">
      <button class="secondary" id="newGame" type="button">New</button>
      <div class="dpad" aria-label="Move controls">
        <button class="arrow spacer" type="button" tabindex="-1">.</button>
        <button class="arrow" type="button" data-move="up" aria-label="Move up">↑</button>
        <button class="arrow spacer" type="button" tabindex="-1">.</button>
        <button class="arrow" type="button" data-move="left" aria-label="Move left">←</button>
        <button class="arrow" type="button" data-move="down" aria-label="Move down">↓</button>
        <button class="arrow" type="button" data-move="right" aria-label="Move right">→</button>
      </div>
      <button class="secondary" id="finish" type="button">End</button>
    </div>
  </main>

  <section class="result" id="result" hidden>
    <div class="result-card">
      <h2 id="resultTitle">Game over</h2>
      <p id="resultText"></p>
      <div class="row">
        <button id="copyResult" type="button">Copy</button>
        <button class="secondary" id="resultNewGame" type="button">New</button>
      </div>
      <textarea id="copyFallback" readonly hidden></textarea>
    </div>
  </section>

  <script>
    const size = 4;
    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const bestTileEl = document.getElementById("bestTile");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const resultTitleEl = document.getElementById("resultTitle");
    const resultTextEl = document.getElementById("resultText");
    const copyFallbackEl = document.getElementById("copyFallback");
    const cells = [];

    let board = emptyBoard();
    let score = 0;
    let moves = 0;
    let ended = false;
    let reached2048 = false;
    let shareText = "";
    let startX = 0;
    let startY = 0;

    function emptyBoard() {
      return Array.from({ length: size }, function() {
        return Array(size).fill(0);
      });
    }

    function cloneBoard(source) {
      return source.map(function(row) {
        return row.slice();
      });
    }

    function maxTile(source) {
      let best = 0;
      source.forEach(function(row) {
        row.forEach(function(value) {
          if (value > best) best = value;
        });
      });
      return best;
    }

    function sameBoard(a, b) {
      for (let row = 0; row < size; row += 1) {
        for (let col = 0; col < size; col += 1) {
          if (a[row][col] !== b[row][col]) return false;
        }
      }
      return true;
    }

    function mergeLine(line) {
      const values = line.filter(function(value) {
        return value > 0;
      });
      const merged = [];
      let gained = 0;

      for (let index = 0; index < values.length; index += 1) {
        if (values[index] === values[index + 1]) {
          const value = values[index] * 2;
          merged.push(value);
          gained += value;
          index += 1;
        } else {
          merged.push(values[index]);
        }
      }

      while (merged.length < size) merged.push(0);

      return {
        line: merged,
        gained: gained,
        changed: line.some(function(value, index) {
          return value !== merged[index];
        }),
      };
    }

    function moveBoard(source, direction) {
      const next = emptyBoard();
      let gained = 0;

      for (let index = 0; index < size; index += 1) {
        let line;
        let moved;

        if (direction === "left" || direction === "right") {
          line = source[index].slice();
          if (direction === "right") line.reverse();
          moved = mergeLine(line);
          gained += moved.gained;
          if (direction === "right") moved.line.reverse();
          next[index] = moved.line;
        } else {
          line = [];
          for (let row = 0; row < size; row += 1) line.push(source[row][index]);
          if (direction === "down") line.reverse();
          moved = mergeLine(line);
          gained += moved.gained;
          if (direction === "down") moved.line.reverse();
          for (let row = 0; row < size; row += 1) next[row][index] = moved.line[row];
        }
      }

      return {
        board: next,
        changed: !sameBoard(source, next),
        gained: gained,
      };
    }

    function emptyCells(source) {
      const open = [];
      for (let row = 0; row < size; row += 1) {
        for (let col = 0; col < size; col += 1) {
          if (source[row][col] === 0) open.push([row, col]);
        }
      }
      return open;
    }

    function addTile() {
      const open = emptyCells(board);
      if (!open.length) return;
      const pick = open[Math.floor(Math.random() * open.length)];
      board[pick[0]][pick[1]] = Math.random() < 0.9 ? 2 : 4;
    }

    function canMove(source) {
      if (emptyCells(source).length) return true;
      for (let row = 0; row < size; row += 1) {
        for (let col = 0; col < size; col += 1) {
          const value = source[row][col];
          if (row < size - 1 && source[row + 1][col] === value) return true;
          if (col < size - 1 && source[row][col + 1] === value) return true;
        }
      }
      return false;
    }

    function classForValue(value) {
      if (!value) return "cell empty";
      const name = value <= 2048 ? "v" + value : "super";
      return "cell " + name + (value >= 1024 ? " wide" : "");
    }

    function render() {
      scoreEl.textContent = score;
      bestTileEl.textContent = maxTile(board) || 2;
      board.forEach(function(row, rowIndex) {
        row.forEach(function(value, colIndex) {
          const cell = cells[rowIndex * size + colIndex];
          cell.className = classForValue(value);
          cell.textContent = value || "";
          cell.setAttribute("aria-label", value ? String(value) : "empty");
        });
      });
    }

    function resultLine() {
      return "2048 score " + score + " | best tile " + (maxTile(board) || 0) + " | moves " + moves;
    }

    function finishGame(title) {
      ended = true;
      shareText = resultLine();
      resultTitleEl.textContent = title || "Game over";
      resultTextEl.textContent = shareText;
      copyFallbackEl.hidden = true;
      copyFallbackEl.value = shareText;
      resultEl.hidden = false;
      statusEl.textContent = "Result ready.";
      parent.postMessage({type:"cartridge-result", text: shareText}, "*");
    }

    function handleMove(direction) {
      if (ended) return;
      const moved = moveBoard(board, direction);
      if (!moved.changed) {
        statusEl.textContent = "No move.";
        return;
      }

      board = moved.board;
      score += moved.gained;
      moves += 1;
      addTile();

      if (!reached2048 && maxTile(board) >= 2048) {
        reached2048 = true;
        statusEl.textContent = "2048 made. Keep going.";
      } else {
        statusEl.textContent = moved.gained ? "+" + moved.gained : "Moved.";
      }

      render();
      if (!canMove(board)) finishGame("No moves left");
    }

    function copyResult() {
      const text = shareText || resultLine();
      function fallback() {
        copyFallbackEl.hidden = false;
        copyFallbackEl.value = text;
        copyFallbackEl.focus();
        copyFallbackEl.select();
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          statusEl.textContent = "Copied.";
        }, fallback);
      } else {
        fallback();
      }
    }

    function newGame() {
      board = emptyBoard();
      score = 0;
      moves = 0;
      ended = false;
      reached2048 = false;
      shareText = "";
      resultEl.hidden = true;
      copyFallbackEl.hidden = true;
      statusEl.textContent = "Ready.";
      addTile();
      addTile();
      render();
    }

    function setState(nextState) {
      board = cloneBoard(nextState.board);
      score = nextState.score || 0;
      moves = nextState.moves || 0;
      ended = Boolean(nextState.ended);
      reached2048 = maxTile(board) >= 2048;
      shareText = "";
      resultEl.hidden = true;
      render();
    }

    for (let index = 0; index < size * size; index += 1) {
      const cell = document.createElement("div");
      cell.className = "cell empty";
      cell.setAttribute("role", "gridcell");
      cells.push(cell);
      boardEl.append(cell);
    }

    boardEl.addEventListener("pointerdown", function(event) {
      startX = event.clientX;
      startY = event.clientY;
      boardEl.setPointerCapture(event.pointerId);
    });

    boardEl.addEventListener("pointerup", function(event) {
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;
      const distance = Math.max(Math.abs(dx), Math.abs(dy));
      if (distance < 28) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        handleMove(dx > 0 ? "right" : "left");
      } else {
        handleMove(dy > 0 ? "down" : "up");
      }
    });

    document.addEventListener("keydown", function(event) {
      const keys = {
        ArrowLeft: "left",
        ArrowRight: "right",
        ArrowUp: "up",
        ArrowDown: "down",
        a: "left",
        d: "right",
        w: "up",
        s: "down",
      };
      const direction = keys[event.key];
      if (!direction) return;
      event.preventDefault();
      handleMove(direction);
    });

    document.querySelectorAll("[data-move]").forEach(function(button) {
      button.addEventListener("click", function() {
        handleMove(button.dataset.move);
      });
    });

    document.getElementById("newGame").addEventListener("click", newGame);
    document.getElementById("resultNewGame").addEventListener("click", newGame);
    document.getElementById("finish").addEventListener("click", function() {
      finishGame("Final score");
    });
    document.getElementById("copyResult").addEventListener("click", copyResult);

    window.__cartridge2048 = {
      mergeLine: mergeLine,
      moveBoard: moveBoard,
      setState: setState,
      finishGame: finishGame,
      getState: function() {
        return {
          board: cloneBoard(board),
          score: score,
          moves: moves,
          ended: ended,
          reached2048: reached2048,
        };
      },
      handleMove: handleMove,
    };

    newGame();
  </script>
</body>
</html>
