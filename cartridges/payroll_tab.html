<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payroll Tab</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
      background: #1f2937;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(460px, 100%);
      padding: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #f8fafc;
      box-shadow: 0 18px 42px #0008;
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    h1 {
      margin: 0;
      color: #0f172a;
      font-size: 36px;
      line-height: 1;
    }
    .sub {
      margin: 6px 0 0;
      color: #475569;
      font-size: 14px;
      font-weight: 750;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(70px, 1fr));
      gap: 8px;
      min-width: 150px;
    }
    .stat {
      border-radius: 8px;
      padding: 8px 10px;
      background: #0f172a;
      color: #f8fafc;
      text-align: center;
    }
    .label {
      display: block;
      color: #bbf7d0;
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .value {
      display: block;
      margin-top: 2px;
      font-size: 18px;
      font-weight: 950;
    }
    .card {
      margin: 16px 0 12px;
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
    }
    .department {
      margin: 0 0 8px;
      color: #047857;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .title {
      margin: 0;
      color: #111827;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.18;
    }
    .clues {
      margin: 10px 0 0;
      color: #475569;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.35;
    }
    .answer {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #f0fdf4;
      color: #14532d;
      font-weight: 900;
    }
    .answer[hidden] { display: none; }
    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      min-width: 0;
      border: 1px solid #94a3b8;
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 850;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #22c55e;
      color: #052e16;
      font: inherit;
      font-weight: 950;
      min-height: 42px;
      padding: 10px 12px;
    }
    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .status {
      min-height: 22px;
      margin: 8px 0 0;
      color: #334155;
      font-size: 14px;
      font-weight: 800;
    }
    .result {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #020617b8;
    }
    .result[hidden] { display: none; }
    .result-card {
      width: min(350px, 100%);
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 16px;
      background: #f8fafc;
      color: #0f172a;
      box-shadow: 0 16px 38px #0008;
    }
    .result-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .result-card p {
      margin: 0 0 12px;
      color: #334155;
      font-weight: 850;
      line-height: 1.35;
    }
    textarea {
      width: 100%;
      height: 74px;
      margin-top: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      font: inherit;
      resize: none;
    }
    @media (max-width: 390px) {
      main { padding: 12px; }
      .top { display: grid; }
      .stats { width: 100%; }
      h1 { font-size: 31px; }
      .title { font-size: 20px; }
      form, .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1>Payroll Tab</h1>
        <p class="sub">Guess the annual public-pay total from the job clues.</p>
      </div>
      <div class="stats" aria-live="polite">
        <div class="stat">
          <span class="label">Score</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="label">Round</span>
          <span class="value" id="round">1/5</span>
        </div>
      </div>
    </div>

    <section class="card" aria-live="polite">
      <p class="department" id="department"></p>
      <p class="title" id="jobTitle"></p>
      <p class="clues" id="clues"></p>
      <div class="answer" id="answer" hidden></div>
    </section>

    <form id="guessForm">
      <input id="guessInput" inputmode="numeric" autocomplete="off" placeholder="Annual total pay">
      <button type="submit">Guess</button>
    </form>

    <div class="actions">
      <button class="secondary" type="button" id="revealButton">Reveal</button>
      <button class="secondary" type="button" id="nextButton">Next</button>
    </div>
    <p class="status" id="status"></p>
  </main>

  <section class="result" id="result" hidden>
    <div class="result-card">
      <h2 id="resultTitle">Final score</h2>
      <p id="resultText"></p>
      <textarea id="copyFallback" readonly></textarea>
    </div>
  </section>

  <script>
    (() => {
      const seedDeck = [
        {
          title: "Senior Track Signal Maintainer",
          department: "Transit Operations",
          clues: "Specialized field work, overtime eligible, night-shift rotations.",
          pay: 184500,
        },
        {
          title: "Deputy Budget Analyst",
          department: "Citywide Administration",
          clues: "Desk role, union step raises, crunch weeks near adoption.",
          pay: 98200,
        },
        {
          title: "Harbor Equipment Mechanic",
          department: "Marine Services",
          clues: "Skilled trade, standby pay, storm response callbacks.",
          pay: 137750,
        },
        {
          title: "School Food Service Manager",
          department: "Education",
          clues: "Cafeteria operations, ten-month school rhythm, summer planning.",
          pay: 74250,
        },
        {
          title: "Fire Communications Supervisor",
          department: "Emergency Dispatch",
          clues: "Command floor lead, holiday coverage, high seniority.",
          pay: 162900,
        },
      ];

      const els = {
        score: document.getElementById("score"),
        round: document.getElementById("round"),
        department: document.getElementById("department"),
        jobTitle: document.getElementById("jobTitle"),
        clues: document.getElementById("clues"),
        answer: document.getElementById("answer"),
        guessInput: document.getElementById("guessInput"),
        status: document.getElementById("status"),
        result: document.getElementById("result"),
        resultTitle: document.getElementById("resultTitle"),
        resultText: document.getElementById("resultText"),
        copyFallback: document.getElementById("copyFallback"),
      };

      let state = {
        deck: seedDeck,
        roundIndex: 0,
        score: 0,
        guesses: [],
        revealed: false,
        finished: false,
      };

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function currency(value) {
        return "$" + Math.round(Number(value) || 0).toLocaleString("en-US");
      }

      function current() {
        return state.deck[state.roundIndex] || state.deck[state.deck.length - 1];
      }

      function scoreGuess(guess, answer) {
        const missPercent = Math.round(Math.abs(guess - answer) / answer * 100);
        const points = Math.max(0, 100 - missPercent);
        return { missPercent, points };
      }

      function averageMiss() {
        if (!state.guesses.length) return 0;
        const total = state.guesses.reduce((sum, guess) => sum + guess.missPercent, 0);
        return Math.round(total / state.guesses.length);
      }

      function shareText() {
        return `Payroll Tab score ${state.score} | avg miss ${averageMiss()}% | rounds ${state.guesses.length}`;
      }

      function render() {
        const item = current();
        els.score.textContent = state.score;
        els.round.textContent = `${Math.min(state.roundIndex + 1, state.deck.length)}/${state.deck.length}`;
        els.department.textContent = item.department;
        els.jobTitle.textContent = item.title;
        els.clues.textContent = item.clues || "";
        if (state.revealed) {
          els.answer.hidden = false;
          els.answer.textContent = `Annual total pay: ${currency(item.pay)}`;
        } else {
          els.answer.hidden = true;
          els.answer.textContent = "";
        }
      }

      function setState(nextState) {
        state = Object.assign({}, state, clone(nextState));
        render();
      }

      function getState() {
        return Object.assign(clone(state), { current: clone(current()) });
      }

      function submitGuess(value) {
        if (state.finished || state.revealed) return getState();
        const guess = Math.max(0, Math.round(Number(value)));
        if (!Number.isFinite(guess)) {
          els.status.textContent = "Enter a number.";
          return getState();
        }
        const item = current();
        const scored = scoreGuess(guess, item.pay);
        state.score += scored.points;
        state.guesses.push({
          guess,
          answer: item.pay,
          missPercent: scored.missPercent,
          points: scored.points,
        });
        state.revealed = true;
        els.status.textContent = `Missed by ${scored.missPercent}%, earned ${scored.points}.`;
        render();
        if (state.guesses.length >= state.deck.length) finishGame("Final score");
        return getState();
      }

      function revealAnswer() {
        if (state.finished) return getState();
        if (!state.revealed) {
          const item = current();
          state.guesses.push({
            guess: null,
            answer: item.pay,
            missPercent: 100,
            points: 0,
            revealed: true,
          });
        }
        state.revealed = true;
        els.status.textContent = "Answer revealed. No points booked for this round.";
        render();
        return getState();
      }

      function nextRound() {
        if (state.finished) return getState();
        if (state.roundIndex >= state.deck.length - 1) {
          finishGame("Final score");
          return getState();
        }
        state.roundIndex += 1;
        state.revealed = false;
        els.guessInput.value = "";
        els.status.textContent = "";
        render();
        return getState();
      }

      function finishGame(title = "Final score") {
        state.finished = true;
        const text = shareText();
        els.resultTitle.textContent = title;
        els.resultText.textContent = text;
        els.copyFallback.value = text;
        els.result.hidden = false;
        parent.postMessage({type:"cartridge-result", text: text}, "*");
        return text;
      }

      document.getElementById("guessForm").addEventListener("submit", (event) => {
        event.preventDefault();
        submitGuess(els.guessInput.value);
      });
      document.getElementById("revealButton").addEventListener("click", revealAnswer);
      document.getElementById("nextButton").addEventListener("click", nextRound);

      window.__cartridgePayrollTab = {
        setState,
        getState,
        submitGuess,
        revealAnswer,
        nextRound,
        finishGame,
      };

      render();
    })();
  </script>
</body>
</html>
