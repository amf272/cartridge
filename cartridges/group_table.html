<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Group Table</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef3f6;
      color: #17212b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 15% 15%, rgba(20, 184, 166, 0.18), transparent 28%),
        linear-gradient(135deg, #eef3f6 0%, #f7efe4 100%);
    }

    main {
      width: min(860px, 100%);
    }

    .game-shell {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(23, 33, 43, 0.12);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(23, 33, 43, 0.16);
      padding: 22px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      border-bottom: 1px solid rgba(23, 33, 43, 0.1);
      padding-bottom: 14px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 1.7rem;
      line-height: 1.1;
    }

    .pill {
      border: 1px solid rgba(23, 33, 43, 0.14);
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff;
      font-weight: 800;
      white-space: nowrap;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .option {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(23, 33, 43, 0.12);
      border-radius: 8px;
      background: #fff;
    }

    .option h2 {
      font-size: 1rem;
    }

    .option p {
      color: #526170;
      margin-top: 3px;
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
    }

    button {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      min-height: 40px;
      min-width: 44px;
      padding: 9px 12px;
      background: #14b8a6;
      color: #061f1d;
      box-shadow: inset 0 -2px 0 rgba(23, 33, 43, 0.12);
    }

    button:hover,
    button:focus-visible {
      background: #2dd4bf;
      outline: 3px solid rgba(217, 119, 6, 0.25);
      outline-offset: 2px;
    }

    .veto {
      background: #f59e0b;
    }

    .next-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .result-card {
      margin-top: 18px;
      border: 1px solid rgba(20, 184, 166, 0.25);
      background: #ffffff;
      border-radius: 8px;
      padding: 16px;
    }

    .result-card h2 {
      font-size: 1rem;
      margin-bottom: 8px;
    }

    #resultText {
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    textarea {
      width: 100%;
      margin-top: 10px;
      min-height: 52px;
      resize: vertical;
      border: 1px solid rgba(23, 33, 43, 0.18);
      border-radius: 8px;
      padding: 10px;
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 640px) {
      .option {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: start;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="game-shell" aria-label="Group Table game">
      <header>
        <div>
          <h1>Group Table</h1>
          <p id="playerStatus">Ari rates privately</p>
        </div>
        <span class="pill" id="progressStatus">Player 1 of 3</span>
      </header>

      <div class="options" id="options"></div>
      <div class="next-row">
        <button type="button" id="nextPlayer">Next</button>
      </div>

      <section class="result-card" id="result" hidden>
        <h2 id="resultTitle">Result</h2>
        <p id="resultText"></p>
        <textarea id="copyFallback" readonly aria-label="Copyable result"></textarea>
      </section>
    </section>
  </main>

  <script>
    (() => {
      const defaultOptions = [
        { id: "noodle", name: "Noodle Clock", note: "Noodles, dumplings, late hours" },
        { id: "taco", name: "Taco Harbor", note: "Tacos, bowls, quick counter" },
        { id: "garden", name: "Garden Signal", note: "Vegetarian plates, tea, quiet tables" },
        { id: "pizza", name: "Pizza Relay", note: "Slices, salads, big booths" },
      ];

      const els = {
        playerStatus: document.querySelector("#playerStatus"),
        progressStatus: document.querySelector("#progressStatus"),
        options: document.querySelector("#options"),
        nextPlayer: document.querySelector("#nextPlayer"),
        result: document.querySelector("#result"),
        resultTitle: document.querySelector("#resultTitle"),
        resultText: document.querySelector("#resultText"),
        copyFallback: document.querySelector("#copyFallback"),
      };

      let state = createInitialState();

      function createInitialState() {
        return {
          players: ["Ari", "Bo", "Cy"],
          options: clone(defaultOptions),
          currentPlayer: 0,
          ratings: {},
          vetoes: {},
          finished: false,
          standings: [],
          winner: null,
          resultText: "",
        };
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function ensureOptionBucket(collection, optionId) {
        if (!collection[optionId] || Array.isArray(collection[optionId])) {
          collection[optionId] = {};
        }
        return collection[optionId];
      }

      function rate(optionId, score) {
        const bucket = ensureOptionBucket(state.ratings, optionId);
        bucket[state.currentPlayer] = clampScore(score);
        render();
        return getState();
      }

      function veto(optionId) {
        const bucket = ensureOptionBucket(state.vetoes, optionId);
        bucket[state.currentPlayer] = true;
        render();
        return getState();
      }

      function clampScore(score) {
        const numeric = Number(score);
        if (!Number.isFinite(numeric)) {
          return 0;
        }
        return Math.max(0, Math.min(10, Math.round(numeric)));
      }

      function nextPlayer() {
        if (state.currentPlayer < state.players.length - 1) {
          state.currentPlayer += 1;
          render();
          return getState();
        }

        finishGame("Table picked");
        return getState();
      }

      function optionVetoCount(optionId) {
        const bucket = state.vetoes[optionId];
        if (!bucket) {
          return 0;
        }
        if (Array.isArray(bucket)) {
          return bucket.filter(Boolean).length;
        }
        return Object.values(bucket).filter(Boolean).length;
      }

      function optionScores(optionId) {
        const bucket = state.ratings[optionId] || {};
        return state.players.map((_, index) => {
          const value = bucket[index];
          return Number.isFinite(Number(value)) ? Number(value) : 0;
        });
      }

      function computeStandings() {
        return state.options
          .map((option) => {
            const scores = optionScores(option.id);
            const total = scores.reduce((sum, score) => sum + score, 0);
            const misery = Math.min(...scores);
            const vetoes = optionVetoCount(option.id);
            return {
              ...option,
              score: total,
              misery,
              vetoes,
            };
          })
          .sort((a, b) =>
            a.vetoes - b.vetoes ||
            b.misery - a.misery ||
            b.score - a.score ||
            a.name.localeCompare(b.name),
          );
      }

      function shareText() {
        const winner = state.winner || computeStandings()[0];
        return `Group Table winner ${winner.name} | score ${winner.score} | vetoes ${winner.vetoes}`;
      }

      function finishGame(title = "Result") {
        state.standings = computeStandings();
        state.winner = state.standings[0] || null;
        state.finished = true;
        state.resultText = shareText();
        render();
        els.resultTitle.textContent = title;
        els.resultText.textContent = state.resultText;
        els.copyFallback.value = state.resultText;
        els.result.hidden = false;
        parent.postMessage({ type: "cartridge-result", text: state.resultText }, "*");
        return state.resultText;
      }

      function setState(nextState) {
        state = {
          ...state,
          ...clone(nextState),
        };
        state.finished = Boolean(state.finished);
        render();
      }

      function getState() {
        return clone(state);
      }

      function render() {
        const player = state.players[state.currentPlayer] || state.players[state.players.length - 1] || "Player";
        els.playerStatus.textContent = `${player} rates privately`;
        els.progressStatus.textContent = `Player ${Math.min(state.currentPlayer + 1, state.players.length)} of ${state.players.length}`;

        els.options.replaceChildren(
          ...state.options.map((option) => {
            const card = document.createElement("section");
            card.className = "option";

            const text = document.createElement("div");
            const heading = document.createElement("h2");
            heading.textContent = option.name;
            const note = document.createElement("p");
            note.textContent = option.note || "Rate 0 to 10, or veto for this player.";
            text.append(heading, note);

            const controls = document.createElement("div");
            controls.className = "controls";
            [0, 3, 5, 7, 10].forEach((score) => {
              const button = document.createElement("button");
              button.type = "button";
              button.textContent = String(score);
              button.addEventListener("click", () => rate(option.id, score));
              controls.append(button);
            });
            const vetoButton = document.createElement("button");
            vetoButton.type = "button";
            vetoButton.className = "veto";
            vetoButton.textContent = "Veto";
            vetoButton.addEventListener("click", () => veto(option.id));
            controls.append(vetoButton);

            card.append(text, controls);
            return card;
          }),
        );

        if (!state.finished) {
          els.result.hidden = true;
        }
      }

      els.nextPlayer.addEventListener("click", nextPlayer);

      window.__cartridgeGroupTable = {
        setState,
        getState,
        rate,
        veto,
        nextPlayer,
        finishGame,
      };

      render();
    })();
  </script>
</body>
</html>
